<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Legal AI{% endblock %}</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0b0f17;
  --bg-elev: #131a26;
  --bg-elev-2: #1a2331;
  --border: #243044;
  --text: #e6e9ef;
  --text-muted: #8a93a6;
  --text-soft: #b6bdcc;
  --accent: #6366f1;
  --accent-soft: #4f46e5;
  --green: #22c55e;
  --green-bg: rgba(34, 197, 94, 0.15);
  --red: #ef4444;
  --red-bg: rgba(239, 68, 68, 0.15);
  --yellow: #f59e0b;
}
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.layout { display: flex; min-height: 100vh; }

.sidebar {
  width: 240px;
  background: var(--bg-elev);
  border-right: 1px solid var(--border);
  padding: 18px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: sticky;
  top: 0;
  height: 100vh;
  flex-shrink: 0;
}
.sidebar-brand {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  padding: 8px 10px 16px 10px;
  letter-spacing: 0.3px;
}
.sidebar-brand .accent { color: var(--accent); }
.sidebar-section {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  padding: 14px 10px 6px 10px;
}
.sidebar a.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 8px;
  color: var(--text-soft);
  text-decoration: none;
  font-size: 14px;
  transition: background 0.15s, color 0.15s;
}
.sidebar a.nav-item:hover { background: var(--bg-elev-2); color: var(--text); }
.sidebar a.nav-item.active {
  background: rgba(99, 102, 241, 0.18);
  color: #c7c9ff;
  font-weight: 600;
}
.sidebar a.nav-item .ico { width: 16px; text-align: center; opacity: 0.9; }

.content { flex: 1; min-width: 0; display: flex; flex-direction: column; }

.topbar {
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 5;
}
.topbar h1 { font-size: 15px; font-weight: 700; color: var(--text); }
.topbar-right { display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--text-muted); }

.main { padding: 20px; max-width: 1200px; width: 100%; margin: 0 auto; }

.mobile-toggle {
  display: none;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 13px;
  cursor: pointer;
}

@media (max-width: 860px) {
  .layout { flex-direction: column; }
  .sidebar {
    width: 100%;
    height: auto;
    position: relative;
    flex-direction: row;
    flex-wrap: wrap;
    padding: 10px;
    gap: 6px;
  }
  .sidebar-brand { width: 100%; padding-bottom: 8px; }
  .sidebar-section { display: none; }
  .sidebar a.nav-item { flex: 1; justify-content: center; padding: 8px 10px; }
  .main { padding: 14px; }
}

{% block extra_styles %}{% endblock %}
</style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand">Legal <span class="accent">AI</span></div>

    <div class="sidebar-section">Навигация</div>
    <a href="/dashboard" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
      <span class="ico">▦</span><span>Dashboard</span>
    </a>
    <a href="/library" class="nav-item {% if active_page == 'library' %}active{% endif %}">
      <span class="ico">▤</span><span>Библиотека</span>
    </a>
    <a href="/history" class="nav-item {% if active_page == 'history' %}active{% endif %}">
      <span class="ico">⌛</span><span>История</span>
    </a>
    <a href="/admin" class="nav-item {% if active_page == 'admin' %}active{% endif %}">
      <span class="ico">⚙</span><span>Админ</span>
    </a>
  </aside>

  <div class="content">
    <div class="topbar">
      <h1>{% block topbar_title %}Legal AI{% endblock %}</h1>
      <div class="topbar-right">{% block topbar_right %}{% endblock %}</div>
    </div>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>

{% block scripts %}{% endblock %}
</body>
</html>
