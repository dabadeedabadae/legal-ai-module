<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal AI — Юридический помощник</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2d3150;
      --accent: #6c63ff;
      --accent-light: #8b85ff;
      --accent-dim: rgba(108,99,255,0.15);
      --user-bg: #6c63ff;
      --bot-bg: #1e2235;
      --text: #e8eaf0;
      --text-muted: #7b82a0;
      --text-dim: #4a5070;
      --success: #4caf82;
      --radius: 16px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .header-info p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      margin-left: auto;
      box-shadow: 0 0 0 3px rgba(76,175,130,0.2);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(76,175,130,0.2); }
      50% { box-shadow: 0 0 0 6px rgba(76,175,130,0.05); }
    }

    /* ── Chat Area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Welcome ── */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      animation: fadeUp 0.5s ease;
    }

    .welcome-icon {
      font-size: 52px;
      margin-bottom: 16px;
      display: block;
    }

    .welcome h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .welcome p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 420px;
      margin: 0 auto 28px;
    }

    .suggestions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 440px;
      margin: 0 auto;
    }

    .suggestion {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
      line-height: 1.4;
    }

    .suggestion:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--text);
      transform: translateX(4px);
    }

    .suggestion span {
      color: var(--accent-light);
      font-weight: 600;
      margin-right: 6px;
    }

    /* ── Messages ── */
    .msg {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.3s ease;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .msg.user .avatar {
      background: linear-gradient(135deg, var(--accent), #a78bfa);
    }

    .msg.bot .avatar {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .bubble {
      max-width: calc(100% - 50px);
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
      white-space: pre-wrap;
    }

    .msg.bot .bubble.loading {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      padding: 14px 20px;
    }

    .dots {
      display: flex;
      gap: 4px;
    }

    .dots span {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Error bubble ── */
    .msg.bot .bubble.error {
      border-color: #ff6b6b44;
      background: rgba(255,107,107,0.08);
      color: #ff8a8a;
    }

    /* ── Input Area ── */
    .input-area {
      padding: 16px 20px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 820px;
      margin: 0 auto;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 10px 10px 18px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      line-height: 1.6;
      max-height: 160px;
      overflow-y: auto;
      padding: 2px 0;
    }

    textarea::placeholder { color: var(--text-dim); }

    textarea::-webkit-scrollbar { width: 3px; }
    textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .send-btn {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .send-btn:hover:not(:disabled) {
      background: var(--accent-light);
      transform: scale(1.05);
    }

    .send-btn:active:not(:disabled) { transform: scale(0.95); }

    .send-btn:disabled {
      background: var(--border);
      cursor: not-allowed;
    }

    .send-btn svg { fill: white; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 10px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Scrollbar for textarea ── */
    textarea::-webkit-scrollbar { width: 3px; }
    textarea::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body>

<header>
  <div class="logo">⚖️</div>
  <div class="header-info">
    <h1>Юридический помощник</h1>
    <p>Уголовный и Уголовно-исполнительный кодекс РК</p>
  </div>
  <div class="status-dot" title="Сервис работает"></div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <span class="welcome-icon">⚖️</span>
    <h2>Чем могу помочь?</h2>
    <p>Задайте вопрос по уголовному законодательству Казахстана. Отвечаю только по официальным источникам.</p>
    <div class="suggestions">
      <button class="suggestion" onclick="fillQuestion(this)">
        <span>→</span>Что такое условно-досрочное освобождение и кто имеет на него право?
      </button>
      <button class="suggestion" onclick="fillQuestion(this)">
        <span>→</span>Какие права есть у осуждённого на свидание с родственниками?
      </button>
      <button class="suggestion" onclick="fillQuestion(this)">
        <span>→</span>Как подать жалобу на действия администрации учреждения?
      </button>
      <button class="suggestion" onclick="fillQuestion(this)">
        <span>→</span>В каких случаях возможна амнистия по уголовному делу?
      </button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea
      id="input"
      placeholder="Введите вопрос по законодательству РК..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Отправить (Enter)">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="input-hint">Enter — отправить &nbsp;·&nbsp; Shift+Enter — новая строка</p>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  let isLoading = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function fillQuestion(btn) {
    const text = btn.textContent.replace(/^→\s*/, '').trim();
    input.value = text;
    autoResize(input);
    input.focus();
  }

  function removeWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function appendMessage(role, text, extra = '') {
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '⚖️';

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (extra ? ' ' + extra : '');

    if (extra === 'loading') {
      bubble.innerHTML = `<div class="dots"><span></span><span></span><span></span></div>`;
    } else {
      bubble.textContent = text;
    }

    div.appendChild(avatar);
    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  async function sendMessage() {
    const question = input.value.trim();
    if (!question || isLoading) return;

    removeWelcome();
    isLoading = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    appendMessage('user', question);
    const loadingBubble = appendMessage('bot', '', 'loading');

    try {
      const res = await fetch('/api/v1/ui/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Ошибка ${res.status}`);
      }

      const data = await res.json();
      loadingBubble.className = 'bubble';
      loadingBubble.textContent = data.answer || '(Пустой ответ)';
    } catch (e) {
      loadingBubble.className = 'bubble error';
      loadingBubble.textContent = '⚠️ ' + (e.message || 'Не удалось получить ответ. Проверьте, что сервис запущен.');
    }

    chat.scrollTop = chat.scrollHeight;
    isLoading = false;
    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
