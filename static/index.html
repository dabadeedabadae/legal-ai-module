<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #B7D4FF;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Shell ── */
    .shell {
      width: 420px;
      height: 580px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08), 0 2px 10px rgba(0,0,0,0.04);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .shell-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 20px 24px 16px;
    }

    .header-icon {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .header-label {
      font-size: 15px;
      font-weight: 500;
      color: #7a7a8a;
      letter-spacing: -0.01em;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: #4caf82;
      border-radius: 50%;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* ── Chat scroll area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 0 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 3px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #e0e0e6; border-radius: 3px; }

    /* ── Welcome / Idle ── */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 8px 0 4px;
    }

    /* Orb */
    .orb-wrap {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orb-outer {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(107,142,245,0.08) 0%, transparent 70%);
      animation: orbPulse 3s ease-in-out infinite;
    }

    .orb-mid {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(107,142,245,0.13) 0%, transparent 70%);
      animation: orbPulse 3s ease-in-out infinite 0.3s;
    }

    .orb-core {
      position: relative;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      animation: orbPulse 3s ease-in-out infinite 0.6s;
    }

    .orb-core svg {
      position: absolute;
      inset: -20px;
      width: calc(100% + 40px);
      height: calc(100% + 40px);
    }

    @keyframes orbPulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.05); }
    }

    .hero-text {
      text-align: center;
      color: #8a8a9a;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.55;
      letter-spacing: -0.01em;
    }

    /* Suggestion chips */
    .chips-section {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      width: 100%;
    }

    .chip {
      background: #fff;
      border: 1px solid #e0e0e6;
      border-radius: 20px;
      padding: 10px 18px;
      font-size: 14px;
      color: #2a2a35;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-align: right;
      line-height: 1.4;
    }

    .chip:hover {
      border-color: #b0b0c4;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .chips-more {
      font-size: 14px;
      color: #9a9aaa;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
      transition: color 0.15s;
    }

    .chips-more:hover { color: #5a5a6a; }

    /* ── Messages ── */
    .msg-bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg-bubble.user {
      align-self: flex-end;
      background: #3b5bff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-bubble.bot {
      align-self: flex-start;
      background: #f4f4f8;
      color: #2a2a35;
      border-bottom-left-radius: 4px;
    }

    .msg-bubble.error {
      background: #fff1f1;
      color: #c03535;
    }

    .msg-bubble.loading {
      display: flex;
      align-items: center;
      padding: 12px 16px;
    }

    .dots { display: flex; gap: 4px; }

    .dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #9a9aaa;
      border-radius: 50%;
      animation: dotBounce 1.2s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
      40%           { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input footer ── */
    .input-area {
      flex-shrink: 0;
      padding: 0 24px 20px;
    }

    .input-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #e4e4ec;
      border-radius: 20px;
      padding: 10px 10px 10px 16px;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-footer:focus-within {
      border-color: #b0b8ff;
      box-shadow: 0 0 0 3px rgba(59,91,255,0.07);
    }

    textarea {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 15px;
      font-family: inherit;
      color: #2a2a35;
      resize: none;
      line-height: 1.5;
      max-height: 100px;
      overflow-y: auto;
      padding: 1px 0;
    }

    textarea::placeholder { color: #b0b0c0; }

    textarea::-webkit-scrollbar { width: 3px; }
    textarea::-webkit-scrollbar-thumb { background: #e0e0e6; border-radius: 3px; }

    .send-btn {
      width: 34px;
      height: 34px;
      background: #3b5bff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .send-btn:hover:not(:disabled) { background: #2a4aee; }
    .send-btn:active:not(:disabled) { transform: scale(0.93); }

    .send-btn:disabled {
      background: #d8d8e4;
      cursor: not-allowed;
    }

    .send-btn svg { fill: #fff; }
    .send-btn:disabled svg { fill: #a0a0b0; }
  </style>
</head>
<body>

<div class="shell">

  <!-- Header -->
  <div class="shell-header">
    <span class="header-icon">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 1 C9 1 9.6 5.4 11.4 7.6 C13.2 9.8 17 9 17 9 C17 9 13.2 8.2 11.4 10.4 C9.6 12.6 9 17 9 17 C9 17 8.4 12.6 6.6 10.4 C4.8 8.2 1 9 1 9 C1 9 4.8 9.8 6.6 7.6 C8.4 5.4 9 1 9 1Z" fill="#3b5bff"/>
      </svg>
    </span>
    <span class="header-label">AI Assist</span>
    <div class="status-dot" title="Сервис работает"></div>
  </div>

  <!-- Chat / Welcome area -->
  <div id="chat">
    <div id="welcome">
      <!-- Orb -->
      <div class="orb-wrap">
        <div class="orb-outer"></div>
        <div class="orb-mid"></div>
        <div class="orb-core">
          <svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <filter id="orbBlur" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
              </filter>
            </defs>
            <g filter="url(#orbBlur)">
              <circle cx="50" cy="55" r="38" fill="#6b8ef5" opacity="0.9"/>
              <circle cx="90" cy="60" r="32" fill="#b5c8ff" opacity="0.85"/>
              <circle cx="68" cy="85" r="30" fill="#e8b4d8" opacity="0.8"/>
              <circle cx="55" cy="40" r="22" fill="#3b5bff" opacity="0.6"/>
            </g>
          </svg>
        </div>
      </div>

      <div class="hero-text">
        Чем могу помочь?<br>
        <span style="font-size:14px; color:#a0a0b0;">Уголовный и Уголовно-исполнительный кодекс РК</span>
      </div>

      <!-- Chips -->
      <div class="chips-section">
        <button class="chip" onclick="fillQuestion(this)">Что такое условно-досрочное освобождение и кто имеет на него право?</button>
        <button class="chip" onclick="fillQuestion(this)">Какие права есть у осуждённого на свидание с родственниками?</button>
        <button class="chip" onclick="fillQuestion(this)">Как подать жалобу на действия администрации учреждения?</button>
        <button class="chips-more">Показать ещё</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-footer">
      <textarea
        id="input"
        placeholder="Введите вопрос по законодательству РК..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="onInput(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Отправить" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
  const chat    = document.getElementById('chat');
  const input   = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  let isLoading = false;

  function onInput(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
    sendBtn.disabled = !el.value.trim();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function fillQuestion(btn) {
    input.value = btn.textContent.trim();
    onInput(input);
    input.focus();
  }

  function removeWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function appendBubble(role, text, extra) {
    removeWelcome();

    const bubble = document.createElement('div');
    bubble.className = `msg-bubble ${role}${extra ? ' ' + extra : ''}`;

    if (extra === 'loading') {
      bubble.innerHTML = `<div class="dots"><span></span><span></span><span></span></div>`;
    } else {
      bubble.textContent = text;
    }

    chat.appendChild(bubble);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  async function sendMessage() {
    const question = input.value.trim();
    if (!question || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    appendBubble('user', question);
    const loader = appendBubble('bot', '', 'loading');

    try {
      const res = await fetch('/api/v1/ui/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Ошибка ${res.status}`);
      }

      const data = await res.json();
      loader.classList.remove('loading');
      loader.textContent = data.answer || '(Пустой ответ)';
    } catch (e) {
      loader.classList.remove('loading');
      loader.classList.add('error');
      loader.textContent = e.message || 'Не удалось получить ответ. Проверьте, что сервис запущен.';
    }

    chat.scrollTop = chat.scrollHeight;
    isLoading = false;
    input.focus();
  }
</script>
</body>
</html>
