<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #fff;
      --text: #e0e0e0;
      --text-muted: #666;
      --user-bg: #222;
      --bot-bg: #161616;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 14px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .header-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: #4caf82;
      border-radius: 50%;
      margin-left: auto;
      flex-shrink: 0;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .welcome {
      text-align: center;
      padding: 48px 20px 0;
    }

    .welcome h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 400px;
      margin: 0 auto 28px;
    }

    .suggestions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 420px;
      margin: 0 auto;
    }

    .suggestion {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, color 0.15s;
      line-height: 1.4;
      font-family: inherit;
    }

    .suggestion:hover {
      border-color: #444;
      color: var(--text);
    }

    .msg {
      display: flex;
      gap: 12px;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }

    .msg.user { flex-direction: row-reverse; }

    .bubble {
      max-width: calc(100% - 44px);
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.7;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid #333;
      color: var(--text);
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
      white-space: pre-wrap;
    }

    .msg.bot .bubble.loading {
      display: flex;
      align-items: center;
      padding: 12px 16px;
    }

    .dots { display: flex; gap: 4px; }

    .dots span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    .msg.bot .bubble.error {
      border-color: #3a2020;
      color: #ff8a8a;
    }

    .input-area {
      padding: 14px 24px 18px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 780px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.15s;
    }

    .input-wrapper:focus-within {
      border-color: #444;
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      line-height: 1.6;
      max-height: 160px;
      overflow-y: auto;
      padding: 2px 0;
    }

    textarea::placeholder { color: var(--text-muted); }

    textarea::-webkit-scrollbar { width: 3px; }
    textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .send-btn {
      width: 34px;
      height: 34px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    .send-btn:hover:not(:disabled) { opacity: 0.85; }
    .send-btn:active:not(:disabled) { opacity: 0.7; }

    .send-btn:disabled {
      background: #2a2a2a;
      cursor: not-allowed;
    }

    .send-btn svg { fill: #111; }
    .send-btn:disabled svg { fill: #555; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: #333;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="header-title">Юридический помощник</div>
    <div class="header-sub">Уголовный и Уголовно-исполнительный кодекс РК</div>
  </div>
  <div class="status-dot" title="Сервис работает"></div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <h2>Чем могу помочь?</h2>
    <p>Задайте вопрос по уголовному законодательству Казахстана. Отвечаю только по официальным источникам.</p>
    <div class="suggestions">
      <button class="suggestion" onclick="fillQuestion(this)">Что такое условно-досрочное освобождение и кто имеет на него право?</button>
      <button class="suggestion" onclick="fillQuestion(this)">Какие права есть у осуждённого на свидание с родственниками?</button>
      <button class="suggestion" onclick="fillQuestion(this)">Как подать жалобу на действия администрации учреждения?</button>
      <button class="suggestion" onclick="fillQuestion(this)">В каких случаях возможна амнистия по уголовному делу?</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea
      id="input"
      placeholder="Введите вопрос по законодательству РК..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Отправить (Enter)">
      <svg width="15" height="15" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="input-hint">Enter — отправить &nbsp;·&nbsp; Shift+Enter — новая строка</p>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  let isLoading = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function fillQuestion(btn) {
    input.value = btn.textContent.trim();
    autoResize(input);
    input.focus();
  }

  function removeWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function appendMessage(role, text, extra = '') {
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (extra ? ' ' + extra : '');

    if (extra === 'loading') {
      bubble.innerHTML = `<div class="dots"><span></span><span></span><span></span></div>`;
    } else {
      bubble.textContent = text;
    }

    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  async function sendMessage() {
    const question = input.value.trim();
    if (!question || isLoading) return;

    removeWelcome();
    isLoading = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    appendMessage('user', question);
    const loadingBubble = appendMessage('bot', '', 'loading');

    try {
      const res = await fetch('/api/v1/ui/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Ошибка ${res.status}`);
      }

      const data = await res.json();
      loadingBubble.className = 'bubble';
      loadingBubble.textContent = data.answer || '(Пустой ответ)';
    } catch (e) {
      loadingBubble.className = 'bubble error';
      loadingBubble.textContent = '⚠️ ' + (e.message || 'Не удалось получить ответ. Проверьте, что сервис запущен.');
    }

    chat.scrollTop = chat.scrollHeight;
    isLoading = false;
    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
