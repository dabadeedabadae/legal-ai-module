<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat Widget</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #e8e8ea;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Widget ── */
    .widget {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .modal {
      pointer-events: all;
      width: 420px;
      height: 580px;
      background: #fff;
      border-radius: 24px;
      padding: 24px 28px 22px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08), 0 2px 10px rgba(0,0,0,0.04);
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow: hidden;
    }

    /* ── Header ── */
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      margin-bottom: 4px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .header-icon {
      color: #3b5bff;
      font-size: 18px;
      line-height: 1;
      display: flex;
      align-items: center;
    }

    .header-label {
      font-size: 15px;
      font-weight: 500;
      color: #7a7a8a;
      letter-spacing: -0.01em;
    }

    .close-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #9a9aaa;
      font-size: 20px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 6px;
      transition: color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn:hover { color: #4a4a5a; }

    /* ── Hero / Orb Zone ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 8px 0 4px;
    }

    .orb-wrap {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Outer ring */
    .orb-outer {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(107,142,245,0.08) 0%, transparent 70%);
      animation: orbPulse 3s ease-in-out infinite;
    }

    /* Middle ring */
    .orb-mid {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(107,142,245,0.13) 0%, transparent 70%);
      animation: orbPulse 3s ease-in-out infinite 0.3s;
    }

    /* Core blob */
    .orb-core {
      position: relative;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      animation: orbPulse 3s ease-in-out infinite 0.6s;
      filter: blur(0px);
    }

    .orb-core svg {
      position: absolute;
      inset: -20px;
      width: calc(100% + 40px);
      height: calc(100% + 40px);
    }

    @keyframes orbPulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.05); }
    }

    .hero-text {
      text-align: center;
      color: #8a8a9a;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.55;
      letter-spacing: -0.01em;
    }

    /* ── Suggestion Chips ── */
    .chips-section {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      margin-bottom: 18px;
    }

    .chip {
      background: #fff;
      border: 1px solid #e0e0e6;
      border-radius: 20px;
      padding: 10px 18px;
      font-size: 14px;
      color: #2a2a35;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-align: right;
      line-height: 1.4;
    }

    .chip:hover {
      border-color: #b0b0c4;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .chips-more {
      font-size: 14px;
      color: #9a9aaa;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
      transition: color 0.15s;
    }

    .chips-more:hover { color: #5a5a6a; }

    /* ── Chat Messages (hidden until first message) ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-right: 2px;
      margin-bottom: 16px;
    }

    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #e0e0e6; border-radius: 3px; }

    .msg-bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .msg-bubble.user {
      align-self: flex-end;
      background: #3b5bff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-bubble.bot {
      align-self: flex-start;
      background: #f4f4f8;
      color: #2a2a35;
      border-bottom-left-radius: 4px;
    }

    .msg-bubble.loading {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
    }

    .dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #9a9aaa;
      border-radius: 50%;
      animation: dotBounce 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
      40%           { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Footer / Input ── */
    .input-footer {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #e4e4ec;
      border-radius: 20px;
      padding: 10px 10px 10px 16px;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-footer:focus-within {
      border-color: #b0b8ff;
      box-shadow: 0 0 0 3px rgba(59,91,255,0.07);
    }

    .chat-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 15px;
      font-family: inherit;
      color: #2a2a35;
      resize: none;
      line-height: 1.5;
      max-height: 100px;
      overflow-y: auto;
      padding: 1px 0;
    }

    .chat-input::placeholder { color: #b0b0c0; }

    .send-btn {
      width: 34px;
      height: 34px;
      background: #3b5bff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .send-btn:hover { background: #2a4aee; }
    .send-btn:active { transform: scale(0.93); }

    .send-btn:disabled {
      background: #d8d8e4;
      cursor: not-allowed;
    }

    .send-btn svg { fill: #fff; }
    .send-btn:disabled svg { fill: #a0a0b0; }

    /* ── State toggling ── */
    .state-idle  .chat-messages  { display: none; }
    .state-chat  .hero           { display: none; }
    .state-chat  .chips-section  { display: none; }
  </style>
</head>
<body>

<div class="widget">
  <div class="modal state-idle" id="modal">

    <!-- Header -->
    <div class="modal-header">
      <div class="header-left">
        <span class="header-icon">
          <!-- ✦ four-pointed star -->
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 1 C9 1 9.6 5.4 11.4 7.6 C13.2 9.8 17 9 17 9 C17 9 13.2 8.2 11.4 10.4 C9.6 12.6 9 17 9 17 C9 17 8.4 12.6 6.6 10.4 C4.8 8.2 1 9 1 9 C1 9 4.8 9.8 6.6 7.6 C8.4 5.4 9 1 9 1Z" fill="#3b5bff"/>
          </svg>
        </span>
        <span class="header-label">AI Assist</span>
      </div>
      <button class="close-btn" onclick="closeWidget()" aria-label="Закрыть">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M12 4L4 12M4 4L12 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Hero orb -->
    <div class="hero">
      <div class="orb-wrap">
        <div class="orb-outer"></div>
        <div class="orb-mid"></div>
        <div class="orb-core">
          <svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <filter id="orbBlur" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
              </filter>
            </defs>
            <g filter="url(#orbBlur)">
              <circle cx="50" cy="55" r="38" fill="#6b8ef5" opacity="0.9"/>
              <circle cx="90" cy="60" r="32" fill="#b5c8ff" opacity="0.85"/>
              <circle cx="68" cy="85" r="30" fill="#e8b4d8" opacity="0.8"/>
              <circle cx="55" cy="40" r="22" fill="#3b5bff" opacity="0.6"/>
            </g>
          </svg>
        </div>
      </div>

      <div class="hero-text">
        What do you want to<br>know about Beyond UI?
      </div>
    </div>

    <!-- Chips -->
    <div class="chips-section">
      <button class="chip" onclick="useChip(this)">Show me pricing plans</button>
      <button class="chip" onclick="useChip(this)">How Beyond UI can help me?</button>
      <button class="chip" onclick="useChip(this)">Tell me more about Beyond UI components?</button>
      <button class="chips-more">Show more</button>
    </div>

    <!-- Chat messages (shown after first send) -->
    <div class="chat-messages" id="chatMessages"></div>

    <!-- Input footer -->
    <div class="input-footer">
      <textarea
        id="chatInput"
        class="chat-input"
        placeholder="Ask me anything..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Send" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>

  </div>
</div>

<script>
  const modal       = document.getElementById('modal');
  const chatInput   = document.getElementById('chatInput');
  const sendBtn     = document.getElementById('sendBtn');
  const chatMessages= document.getElementById('chatMessages');
  let isLoading = false;

  /* Enable/disable send button based on input */
  chatInput.addEventListener('input', () => {
    sendBtn.disabled = !chatInput.value.trim();
  });

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function useChip(btn) {
    chatInput.value = btn.textContent.trim();
    chatInput.dispatchEvent(new Event('input'));
    chatInput.focus();
  }

  function closeWidget() {
    modal.style.display = 'none';
  }

  function switchToChat() {
    modal.classList.remove('state-idle');
    modal.classList.add('state-chat');
  }

  function appendBubble(role, text, extra) {
    if (modal.classList.contains('state-idle')) switchToChat();

    const bubble = document.createElement('div');
    bubble.className = `msg-bubble ${role}${extra ? ' ' + extra : ''}`;

    if (extra === 'loading') {
      bubble.innerHTML = `<div class="dots"><span></span><span></span><span></span></div>`;
    } else {
      bubble.textContent = text;
    }

    chatMessages.appendChild(bubble);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return bubble;
  }

  async function sendMessage() {
    const question = chatInput.value.trim();
    if (!question || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    chatInput.value = '';
    chatInput.style.height = 'auto';

    appendBubble('user', question);
    const loader = appendBubble('bot', '', 'loading');

    try {
      const res = await fetch('/api/v1/ui/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Error ${res.status}`);
      }

      const data = await res.json();
      loader.classList.remove('loading');
      loader.textContent = data.answer || '(Empty response)';
    } catch (e) {
      loader.classList.remove('loading');
      loader.style.color = '#e05555';
      loader.textContent = e.message || 'Could not get a response.';
    }

    chatMessages.scrollTop = chatMessages.scrollHeight;
    isLoading = false;
    chatInput.focus();
  }
</script>
</body>
</html>
